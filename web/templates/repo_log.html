{{ define "repo_log" }}
{{ $repo := .RepoName }}
<html>
  <head>
    {{ template "head" . }}
    <title>{{ $repo }}: log</title>
  </head>
  <body>
    {{ template "repo_header" . }}
    <main>
      {{ template "_commit_table" (dict "Repo" $repo "Commits" .P.Commits) }}
      <div class="center">
        {{ if .P.NextAfter }}
        <a href="?after={{ urlencode .P.NextAfter }}">[load more]</a>
        {{ end }}
      </div>
    </main>
  </body>
</html>
{{ end }}
